db:
  parameters: 
    max_connections: "100"
    shared_buffers: 1GB
    temp_buffers: 32MB
    work_mem: 32MB 
    timezone: "Europe/Berlin"
    maintenance_work_mem: 32MB
    autovacuum_work_mem: 32MB
    temp_file_limit: 2GB
    effective_cache_size: 2GB
    vacuum_cost_delay: 20ms
    effective_io_concurrency: "1"
    jit: "on"
    log_autovacuum_min_duration: "5000"
    log_checkpoints: "off"
    log_connections: "off"
    log_disconnections: "off"
    log_min_duration_statement: "5000"
    log_statement: "none"

  volume:
    size: 5Gi
    # storageClass: standard
    # resizeInUseVolumes: true
    # pvcTemplate: {}
  
  # allowCloneFrom: <namespace>
  allowCloneFrom: null
  
  image:
    pullPolicy: IfNotPresent
    registry: ghcr.io/cloudnative-pg
    name: postgresql
    tag: 18.3-standard-trixie
  
  generateIssuer: true
    # true: generate a CA cert using provided caIssuer
    # false: use provided caIssuer as CA; as such, must not be a self-signing issuer
  caIssuer:
    group: cert-manager.io
    kind: ClusterIssuer
    name: selfsigned

  # CNPG value templates
  # These are injected directly into the CNPG cluster config so for really
  # specific overrides you can redefine these
  # Alternatively, there are overlay dictionaries under .db.overrides
  # these allow you to override very specific rendered values without
  # redefining the whole template
  template: |
    bootstrap:
      {{- if eq .db.bootstrap.mode "normal" }}
      initdb:
        database: agency
        owner: agency
        localeCType: en_US.UTF-8
        localeCollate: en_US.UTF-8
        postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS "uuid-ossp"
        - CREATE EXTENSION IF NOT EXISTS "pgcrypto"
        - CREATE EXTENSION IF NOT EXISTS "earthdistance" CASCADE
      {{- else if eq .db.bootstrap.mode "recovery" }}
      recovery:
        database: agency
        owner: agency
        {{- with .db.bootstrap.recovery.recoveryTarget }}
        recoveryTarget: {{ . | toYaml | nindent 8 }}
        {{- end }}{{/* with .db.bootstrap.recovery.recoveryTarget */}}
        
        {{- if eq .db.bootstrap.recovery.source "plugin" }}
        source: fromPlugin
        {{- else if eq .db.bootstrap.recovery.source "backup" }}
        backup: {{ .db.bootstrap.recovery.backupName }}
        {{- end }}{{/* bootstrap.recovery.source */}}
      {{- else if eq .db.bootstrap.mode "clone" }}
      pg_basebackup:
        database: agency
        owner: agency
        source: fromCluster
      {{- end }}{{/* bootstrap.mode */}}

    {{- if and (eq .db.bootstrap.mode "recovery") (eq .db.bootstrap.recovery.source "plugin") }}
    externalClusters:
    - name: fromPlugin
      {{- $plugin := mergeOverwrite (deepCopy .db.backup.plugin) ( .db.bootstrap.recovery.pluginOverride | default dict ) }}
      plugin: {{ $plugin | toYaml | nindent 8 }}
    {{- else if eq .db.bootstrap.mode "clone" }}
    externalClusters:
    - name: fromCluster
      {{- if eq .db.bootstrap.clone.source "peer" }}
      connectionParameters:
        host: {{ .db.bootstrap.clone.name | default .releaseName }}-db-rw.{{ .db.bootstrap.clone.namespace | default .Release.Namespace }}
        user: streaming_replica
      {{- if .db.bootstrap.clone.namespace }}
      sslKey:
        name: {{ default .releaseName }}-db-clone-tls
        key: tls.key
      sslCert:
        name: {{ default .releaseName }}-db-clone-tls
        key: tls.crt
      sslRootCert:
        name: {{ default .releaseName }}-db-clone-tls
        key: ca.crt
      {{- else }}{{/* no namespace */}}
      sslKey:
        name: {{ .db.bootstrap.clone.name }}-db-replica-tls
        key: tls.key
      sslCert:
        name: {{ .db.bootstrap.clone.name }}-db-replica-tls
        key: tls.crt
      sslRootCert:
        name: {{ .db.bootstrap.clone.name }}-db-replica-tls
        key: ca.crt
      {{- end }}{{/* clone.namespace */}}
      {{- else if eq .db.bootstrap.clone.source "cluster" }}
      {{ .db.bootstrap.clone.cluster | toYaml | nindent 2 }}
      {{- end }}{{/* clone.source == cluster */}}
    {{- end }}{{/* bootstrap.mode == clone */}}
    {{ if .db.bootstrap.standby }}
    replica:
      enabled: true
      source: fromCluster
    {{- end }}{{/* bootstrap.standby */}}

    {{- with .db.backup }}{{- if .enabled }}
    backup:
      target: {{ .target | default "prefer-standby" }}

    plugins:
    - name: {{ .plugin.name }}
      isWALArchiver: true
      parameters: {{ .plugin.parameters | toYaml | nindent 8 }}
    {{- end }}{{- end }}

  overrides: null
  ## directly override rendered template values here

  bootstrap: 
    mode: normal
    ## * normal: bootstrap a new cluster
    ## * recovery: recover a cluster from a backup
    ## * clone: clone a live cluster using pg_basebackup

    recovery:
      source: plugin # one of: plugin, backup; to implement in the future: volumeSnapshot

      ## * plugin: recover from backup management plugin, defined under backup.plugin
      ## * with the overrides under recovery.pluginOverride when defined
      ## * backup: recover from a backup CRD, defined under recovery.backupName
      # pluginOverride:
      #   name: barman-cloud.cloudnative-pg.io
      #   parameters:
      #     barmanObjectName: wasabi-objectstore
      # backupName: <backup-name>
      ## recovery target as defined in CNPG docs
      # recoveryTarget:
      #   backupID: <backup-id>
      #   targetTLI: <timeline>
      #   targetLSN: <LSN>
      #   targetTime: <timestamp>
      #   targetXID: <xid>
      #   targetName: <name>
      #   targetImmediate: true|false
      #   exclusive: true|false
    clone:
      source: peer
      ## * peer - clone from another agency companies install with a CNPG operated cluster
      ##      at least one of namespace or name need to be defined
      ##      if cross-namespace cloning, mirror the replica-tls secret
      ## * cluster - clone from a custom cluster fully defined under clone.cluster
      # namespace: production
      # name: <agency-companies-install-name>
      # cluster: 
      #   connectionParameters:
      #     host: <hostname>
      #     user: <replication-user>
      #     sslMode: [disable|require|verify-ca|verify-full]
      #   password:
      #     name: <secret-name>
      #     key: <secret-key>
      #   sslKey:
      #     name: <secret-name>
      #     key: <secret-key>
      #   sslCert:
      #     name: <secret-name>
      #     key: <secret-key>
      #   sslRootCert:
      #     name: <secret-name>
      #     key: <secret-key>
    
    standby: false
    ## creates a standby cluster using the same source as the clone or recovery

  backup:
    enabled: false
    schedule: null # set to cron spec string to enable scheduled backups
    target: prefer-standby
    plugin:
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: wasabi-objectstore
        # serverName: <serverName> # optional, defaults to cluster name

  ## CNPG specific: affinity rules
  ## See CNPG docs for details: 
  ## https://cloudnative-pg.io/documentation/1.20/api_reference/#affinityconfiguration
  ## example:
  # affinity: 
  #   enablePodAntiAffinity: true
  #   topologyKey: kubernetes.io/hostname
  #   nodeSelector:
  #     kubernetes.io/postgres.prod: "true"
  #   nodeAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       nodeSelectorTerms:
  #       - matchExpressions:
  #         - key: kubernetes.io/postgres.prod
  #           operator: In
  #           values:
  #           - "true"
  #   tolerations:
  #   - key: "node-role.kubernetes.io/master"
  #     operator: "Exists"
  #     effect: "NoSchedule"
  #   - key: "node.kubernetes.io/not-ready"
  #     operator: "Exists"
  #     effect: "NoExecute"
  #   - key: "node.kubernetes.io/unreachable"
  #     operator: "Exists"
  #     effect: "NoExecute"
  #   podAntiAffinityType: required
  #   additionalPodAntiAffinity: []
  #   additionalPodAffinity: []

  affinity: null

  # add a PodMonitor for the cluster, requires prometheus operator
  monitoring: false

